<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Rishikesh</title>
  <style>
    body { font-family: Arial; text-align: center; background: linear-gradient(135deg,#0f172a,#1e293b); color:white; margin:0; }
    #startScreen,#gameScreen{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column}
    #startScreen.active,#gameScreen.active{display:flex}
    h1{font-size:2.6rem;margin-bottom:20px}
    button{padding:12px 22px;font-size:18px;border:none;border-radius:10px;cursor:pointer;background:#22c55e;color:white;margin:6px}
    .board{display:grid;grid-template-columns:repeat(3,110px);gap:10px;margin-top:20px}
    .cell{width:110px;height:110px;background:#1e293b;display:flex;justify-content:center;align-items:center;font-size:2.4rem;cursor:pointer;border-radius:12px}
    .cell:hover{background:#334155}
    .win{background:#22c55e!important}
    #status{margin-top:15px;font-size:22px}
  </style>
</head>
<body>

<div id="startScreen" class="active">
  <h1>RISHIKESH K THE CREATOR</h1>
  <button onclick="startGame()">Start Game (vs AI)</button>
  <button onclick="shareGame()">📤 Share</button>
  <button onclick="copyLink()">🔗 Copy Link</button>
</div>

<div id="gameScreen">
  <h1>Tic Tac Toe (You vs AI)</h1>
  <div class="board" id="board"></div>
  <div id="status"></div>
  <button onclick="restartGame()">Restart</button>
</div>

<script>
  const boardElement = document.getElementById("board");
  const statusText = document.getElementById("status");

  let board = ["","","","","","","","",""];
  let human = "X";
  let ai = "O";
  let gameActive = true;

  function startGame(){
    document.getElementById("startScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");
    createBoard();
  }

  function createBoard(){
    boardElement.innerHTML="";
    board.forEach((_,i)=>{
      const cell=document.createElement("div");
      cell.classList.add("cell");
      cell.innerText=board[i];
      cell.onclick=()=>playerMove(i);
      boardElement.appendChild(cell);
    });
    statusText.innerText="Your Turn";
  }

  function playerMove(i){
    if(board[i]!==""||!gameActive) return;
    board[i]=human;
    updateGame();
    if(gameActive) setTimeout(aiMove,400);
  }

  function aiMove(){
    let best = minimax(board, ai).index;
    board[best]=ai;
    updateGame();
  }

  function updateGame(){
    createBoard();
    let winPattern = getWin();
    if(winPattern){
      highlight(winPattern);
      statusText.innerText = (board[winPattern[0]]===human)?"You Win! 🎉":"AI Wins 🤖";
      gameActive=false; return;
    }
    if(!board.includes("")){
      statusText.innerText="Draw!";
      gameActive=false; return;
    }
  }

  function getWin(){
    const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let p of w){
      if(board[p[0]] && board[p[0]]===board[p[1]] && board[p[0]]===board[p[2]]) return p;
    }
    return null;
  }

  function highlight(p){
    const cells=document.querySelectorAll(".cell");
    p.forEach(i=>cells[i].classList.add("win"));
  }

  function emptyIndexes(b){ return b.map((v,i)=>v===""?i:null).filter(v=>v!==null); }

  function minimax(newBoard, player){
    let avail = emptyIndexes(newBoard);
    if(checkWin(newBoard,human)) return {score:-10};
    if(checkWin(newBoard,ai)) return {score:10};
    if(avail.length===0) return {score:0};

    let moves=[];
    for(let i=0;i<avail.length;i++){
      let move={};
      move.index=avail[i];
      newBoard[avail[i]]=player;

      if(player===ai){
        let result=minimax(newBoard,human);
        move.score=result.score;
      } else {
        let result=minimax(newBoard,ai);
        move.score=result.score;
      }

      newBoard[avail[i]]="";
      moves.push(move);
    }

    let bestMove;
    if(player===ai){
      let bestScore=-10000;
      for(let i=0;i<moves.length;i++){
        if(moves[i].score>bestScore){bestScore=moves[i].score;bestMove=i}
      }
    } else {
      let bestScore=10000;
      for(let i=0;i<moves.length;i++){
        if(moves[i].score<bestScore){bestScore=moves[i].score;bestMove=i}
      }
    }

    return moves[bestMove];
  }

  function checkWin(b,p){
    const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return w.some(c=>b[c[0]]===p&&b[c[1]]===p&&b[c[2]]===p);
  }

  function restartGame(){
    board=["","","","","","","","",""];
    gameActive=true;
    createBoard();
  }

  function shareGame(){
    const data={title:"Tic Tac Toe",text:"Play this game!",url:window.location.href};
    if(navigator.share) navigator.share(data);
    else alert("Use Copy Link");
  }

  function copyLink(){
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied! Share on Instagram/Snapchat 😎");
  }
</script>

</body>
</html>

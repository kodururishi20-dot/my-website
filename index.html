<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Rishikesh</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      margin: 0;
    }

    #startScreen, #gameScreen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fadeIn 0.8s ease;
    }

    #startScreen.active, #gameScreen.active { display: flex; }

    h1 { font-size: 2.6rem; margin-bottom: 20px; }

    button {
      padding: 12px 22px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #22c55e;
      color: white;
      margin: 6px;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover { transform: scale(1.08); background: #16a34a; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
      margin-top: 20px;
    }

    .cell {
      width: 110px; height: 110px;
      background: #1e293b;
      display: flex; justify-content: center; align-items: center;
      font-size: 2.4rem;
      cursor: pointer;
      border-radius: 12px;
      transition: transform 0.2s, background 0.3s;
    }

    .cell:hover { background: #334155; transform: scale(1.05); }

    .win { background: #22c55e !important; }

    #status { margin-top: 15px; font-size: 22px; }

    .share-box { margin-top: 20px; }

    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  </style>
</head>
<body>

<div id="startScreen" class="active">
  <h1>RISHIKESH K THE CREATOR</h1>
  <button onclick="startGame()">Start Game</button>

  <div class="share-box">
    <p>Share with your friends 👇</p>
    <button onclick="shareGame()">📤 Share</button>
    <button onclick="copyLink()">🔗 Copy Link</button>
  </div>
</div>

<div id="gameScreen">
  <h1>Tic Tac Toe</h1>
  <div class="board" id="board"></div>
  <div id="status"></div>
  <button onclick="restartGame()">Restart</button>
</div>

<script>
  const boardElement = document.getElementById("board");
  const statusText = document.getElementById("status");

  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;

  function startGame() {
    document.getElementById("startScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");
    createBoard();
  }

  function createBoard() {
    boardElement.innerHTML = "";
    board.forEach((_, index) => {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.innerText = board[index];
      cell.addEventListener("click", () => handleMove(index));
      boardElement.appendChild(cell);
    });
    statusText.innerText = `Player ${currentPlayer}'s Turn`;
  }

  function handleMove(index) {
    if (board[index] !== "" || !gameActive) return;

    board[index] = currentPlayer;
    createBoard();

    const winPattern = getWinningPattern();
    if (winPattern) {
      highlightWin(winPattern);
      statusText.innerText = `Player ${currentPlayer} Wins! 🎉`;
      gameActive = false;
      return;
    }

    if (!board.includes("")) {
      statusText.innerText = "It's a Draw!";
      return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
  }

  function getWinningPattern() {
    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    for (let pattern of winPatterns) {
      const [a,b,c] = pattern;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return pattern;
      }
    }
    return null;
  }

  function highlightWin(pattern) {
    const cells = document.querySelectorAll(".cell");
    pattern.forEach(i => cells[i].classList.add("win"));
  }

  function restartGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    createBoard();
  }

  // SHARE FEATURES
  function shareGame() {
    const shareData = {
      title: "Tic Tac Toe by Rishikesh",
      text: "Play this cool Tic Tac Toe game I found!",
      url: window.location.href
    };

    if (navigator.share) {
      navigator.share(shareData);
    } else {
      alert("Sharing not supported. Use Copy Link instead.");
    }
  }

  function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied! Now paste on Instagram or Snapchat 😎");
  }
</script>

</body>
</html>

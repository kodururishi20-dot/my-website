<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akasha's Universe 💙</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #cce7ff, #e6f2ff);
    text-align: center;
    color: #333;
}

.container {
    padding: 40px;
}

h1 {
    font-size: 3rem;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #66b3ff;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #4da6ff;
}

#secret {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: #0077cc;
}
</style>
</head>

<body>

<div class="container">
    <h1>Welcome to Akasha's Universe 💙</h1>
    <p>A place made just for you 😄</p>

    <!-- Compliment Generator -->
    <div class="card">
        <h3>✨ Compliment Machine</h3>
        <p id="compliment">Click below 😏</p>
        <button onclick="giveCompliment()">Try me</button>
    </div>

    <!-- Funny Generator -->
    <div class="card">
        <h3>😂 Funny Mode</h3>
        <p id="funny">Click for chaos</p>
        <button onclick="funnyLine()">Go 😂</button>
    </div>

    <!-- AI Prediction -->
    <div class="card">
        <h3>🤖 AI About You</h3>
        <p id="ai">Click to reveal</p>
        <button onclick="aiPredict()">Reveal</button>
    </div>

    <!-- Secret Button -->
    <div class="card">
        <h3>🎁 Secret</h3>
        <button onclick="showSecret()">Unlock</button>
        <p id="secret">This site is simple... but the intention isn't 🙂</p>
    </div>
</div>

<script>

let compliments = [
"You're effortlessly funny 😂",
"You make boring things interesting",
"Your vibe is actually rare",
"You're cooler than you think 😎",
"You have main character energy"
];

let funny = [
"You are 80% chaos, 20% logic 😄",
"If laziness was a sport, you'd still not participate",
"You + snacks = perfect combo",
"You probably laugh at your own jokes (and that's fine)",
"Breaking news: Akasha detected being awesome again"
];

function giveCompliment() {
    document.getElementById("compliment").innerText =
    compliments[Math.floor(Math.random()*compliments.length)];
}

function funnyLine() {
    document.getElementById("funny").innerText =
    funny[Math.floor(Math.random()*funny.length)];
}

function aiPredict() {
    let moods = ["Happy 😊", "Hungry 🍕", "Laughing 😂", "Overthinking 🤔"];
    document.getElementById("ai").innerText =
    "AI says you are: " + moods[Math.floor(Math.random()*moods.length)];
}

function showSecret() {
    document.getElementById("secret").style.display = "block";
}

</script>

</body>
</html>
